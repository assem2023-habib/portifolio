<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Skills - Assem Adel Habib</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

            'on-surface': 'var(--color-on-surface)',  // #272829 (default-color)
            'background': 'var(--color-background)',  // #ffffff (background-color)
            'heading': 'var(--color-heading)',      // #45505b (heading-color)
            'contrast': 'var(--color-contrast)',    // #ffffff (contrast-color)
            'error': '#ba1a1a',
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",

            "full": "9999px"

          "spacing": {

            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

          }

  <!-- Main CSS (Unified with index.html) -->
  <link href="assets/css/main.css" rel="stylesheet">
  
  <style>
    /* Override for Tailwind compatibility */
    body { 
      font-family: 'Inter', sans-serif !important; 
      -webkit-font-smoothing: antialiased; 
    }
    
    /* Dark mode toggle button */
    #darkModeToggle {
      transition: all 0.3s ease;
    }
    
    #darkModeToggle:hover {
      transform: scale(1.05);
    }
    
    #darkModeToggle:active {
      transform: scale(0.95);
    }
    
    /* Icon alignment */
    .material-symbols-outlined { 
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
      font-size: 24px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
  
  <!-- Dark Mode Toggle Button (Mobile Only) -->
  <button id="darkModeToggle" class="fixed top-4 right-4 z-50 p-3 rounded-xl bg-white/80 backdrop-blur-xl shadow-[0_4px_12px_rgba(0,88,188,0.08)] border border-outline-variant/20 hover:bg-primary-container/20 transition-all active:scale-90 md:hidden" title="تبديل الوضع المظلم / Toggle Dark Mode">
    <span class="material-symbols-outlined text-on-surface-variant" id="darkModeIcon">dark_mode</span>
  </button>

  <!-- Main Content -->
  <main class="flex-1">
    <!-- Skills Section -->
    <section class="px-margin py-xl">
      <div class="text-center mb-xl">
        <h1 class="font-headline-lg text-headline-lg text-primary mb-md">Skills</h1>
        <p class="font-body-md text-body-md text-on-surface-variant">
          <span class="lang-en">All my technical skills and proficiency levels</span>
          <span class="lang-ar" style="display: none">كل مهاراتي التقنية ومستويات الكفاءة</span>
        </p>
      </div>
      
      <!-- Skills Grid (Bento Style) -->
      <div id="skills-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md">
        <!-- سيتم تحميل المهارات ديناميكيًا من data/skills.json -->
      </div>
    </section>
  </main>

  <!-- Footer (Glass Style - مطابق للقالب) -->
  <footer class="bg-surface/60 backdrop-blur-xl w-full mt-auto py-xl px-margin text-center flex flex-col items-center justify-center gap-md">
    <div class="font-headline-sm text-headline-sm font-black text-primary">AH</div>
    <p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 Assem Adel Habib</p>
    <div class="flex gap-lg">
      <a class="text-primary underline font-body-sm text-body-sm hover:opacity-80 transition-opacity" href="https://linkedin.com/in/assem-habib-5236a423b" target="_blank">LinkedIn</a>
      <a class="text-on-surface-variant font-body-sm text-body-sm hover:text-primary transition-colors" href="https://github.com/assem2023-habib" target="_blank">GitHub</a>
      <a class="text-on-surface-variant font-body-sm text-body-sm hover:text-primary transition-colors" href="index.html">Portfolio</a>
    </div>
  </footer>

  <!-- Dark Mode Toggle Script (Unified with index.html) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const darkModeToggle = document.getElementById('darkModeToggle');
      const darkModeIcon = document.getElementById('darkModeIcon');
      const body = document.body;
      
      // Check for saved theme preference (matching index.html system)
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        body.classList.add('dark-mode');
        if (darkModeIcon) darkModeIcon.textContent = 'light_mode';
      } else {
        body.classList.remove('dark-mode');
        if (darkModeIcon) darkModeIcon.textContent = 'dark_mode';
      }
      
      // Toggle dark mode on button click
      if (darkModeToggle) {
        darkModeToggle.addEventListener('click', function() {
          const isDark = body.classList.toggle('dark-mode');
          
          if (darkModeIcon) {
            darkModeIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
          }
          
          // Save preference to localStorage
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          
          console.log('🌙 Dark mode:', isDark ? 'ON' : 'OFF');
        });
      }
      
      // Sync with other pages
      window.addEventListener('storage', function(e) {
        if (e.key === 'theme') {
          if (e.newValue === 'dark') {
            body.classList.add('dark-mode');
            if (darkModeIcon) darkModeIcon.textContent = 'light_mode';
          } else {
            body.classList.remove('dark-mode');
            if (darkModeIcon) darkModeIcon.textContent = 'dark_mode';
          }
        }
      });
      
      // Load skills (error fixed)
      fetch('data/skills.json')
        .then(response => response.json())
        .then(data => {
          const skills = data.skills || data;
          const container = document.getElementById('skills-container');
          container.innerHTML = '';
          
          const levelColors = {
            'excellent': '#28a745',
            'very-good': '#007bff',
            'good': '#fd7e14',
            'average': '#6c757d'
          };
          
          const levelLabels = {
            'excellent': { en: 'Excellent', ar: 'ممتاز' },
            'very-good': { en: 'Very Good', ar: 'جيد جداً' },
            'good': { en: 'Good', ar: 'جيد' },
            'average': { en: 'Average', ar: 'متوسط' }
          };
          
          skills.forEach(skill => {
            const skillCard = document.createElement('div');
            skillCard.className = 'bg-white/80 backdrop-blur-xl rounded-xl shadow-[0_4px_12px_rgba(0,88,188,0.08)] p-md flex items-center justify-between border border-outline-variant/20 hover:border-primary/30 transition-all';
            
            skillCard.innerHTML = `
              <div class="flex items-center gap-md">
                <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center">
                  <span class="material-symbols-outlined text-blue-600">${skill.icon || 'code'}</span>
                </div>
                <div>
                  <h3 class="font-label-md text-label-md text-on-surface font-bold">${skill.name}</h3>
                  <p class="font-body-sm text-body-sm text-on-surface-variant">${skill.description || ''}</p>
                </div>
              </div>
              <div class="flex items-center gap-sm">
                <div class="w-3 h-3 rounded-full" style="background-color: ${levelColors[skill.level]}"></div>
                <span class="font-label-md text-label-md text-on-surface-variant">
                  <span class="lang-en">${levelLabels[skill.level].en}</span>
                  <span class="lang-ar" style="display: none">${levelLabels[skill.level].ar}</span>
                </span>
              </div>
            `;
            
            container.appendChild(skillCard);
          });
        })
        .catch(error => console.error('Error loading skills:', error));
    });
  </script>
</body>
</html>

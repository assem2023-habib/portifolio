<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resume — CV Carousel (v2: imagery + hover)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d12;
  --violet:#7c6cf0;
  --violet-soft:rgba(124,108,240,0.14);
  --violet-line:rgba(124,108,240,0.22);
  --white:#f1f0f5;
  --dim:rgba(241,240,245,0.55);
  --muted:rgba(241,240,245,0.30);
  --border-soft:rgba(255,255,255,0.09);
}
body{
  background:var(--bg);color:#fff;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.resume-section{padding:80px 24px;background:var(--bg);overflow:hidden;}
.container{max-width:1100px;margin:0 auto;}

.section-title{text-align:center;margin-bottom:14px;}
.section-title h2{font-size:30px;font-weight:700;color:#fff;margin-bottom:8px;}
.section-title .rule{width:46px;height:2px;background:var(--violet);margin:0 auto 18px;border-radius:2px;}
.section-title p{font-size:14.5px;color:var(--dim);max-width:520px;margin:0 auto;}

.carousel-wrap{position:relative;padding:36px 0 30px;}
.ambient-glow{
  position:absolute;top:50%;left:50%;width:520px;height:380px;
  transform:translate(-50%,-50%);
  background:radial-gradient(ellipse, rgba(124,108,240,0.10) 0%, transparent 72%);
  pointer-events:none;z-index:0;filter:blur(4px);
}
.carousel-viewport{
  position:relative;height:360px;z-index:1;
  display:flex;align-items:center;justify-content:center;
  perspective:1200px;
}
.carousel-track{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

.cv-card{
  position:absolute;width:288px;
  will-change:transform,opacity;
  transition:transform .5s cubic-bezier(.22,.9,.3,1),opacity .5s cubic-bezier(.22,.9,.3,1);
  cursor:pointer;
}

.cv-card-face{
  position:relative;border-radius:14px;overflow:hidden;
  border:1px solid var(--border-soft);background:#16161d;
  box-shadow:0 10px 26px rgba(0,0,0,0.35);
  transition:transform .35s cubic-bezier(.22,.9,.3,1),box-shadow .35s ease,border-color .35s ease;
}

/* ════ HOVER EFFECT — only meaningful on the active (center) card ════ */
.cv-card.is-center:hover .cv-card-face{
  transform:translateY(-7px) scale(1.025);
  box-shadow:0 22px 44px rgba(0,0,0,0.50), 0 0 0 1px var(--hover-accent,rgba(124,108,240,0.35)), 0 0 32px var(--hover-glow,rgba(124,108,240,0.20));
  border-color:var(--hover-accent,rgba(124,108,240,0.40));
}
.cv-card.is-center:hover .cv-bg-canvas{transform:scale(1.08);filter:saturate(1.25) brightness(1.08);}
.cv-card.is-center:hover .cv-icon-badge{transform:rotate(-6deg) scale(1.08);background:var(--hover-accent,rgba(124,108,240,0.30));}
.cv-card.is-center:hover .scan-line{opacity:1;}

/* background canvas, scales smoothly on hover */
.cv-bg-canvas{
  position:absolute;inset:0;width:100%;height:100%;z-index:0;
  transition:transform .5s cubic-bezier(.22,.9,.3,1),filter .5s ease;
}

/* subtle animated scan-line sweep that only appears on hover, premium "tech" feel */
.scan-line{
  position:absolute;left:0;right:0;height:50px;z-index:1;
  background:linear-gradient(180deg, transparent, rgba(255,255,255,0.10), transparent);
  opacity:0;transition:opacity .3s ease;
  animation:scanSweep 2.4s linear infinite;
  pointer-events:none;
}
@keyframes scanSweep{
  0%{top:-60px;}
  100%{top:260px;}
}

.spec-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(180deg, rgba(22,22,29,0.30) 0%, rgba(22,22,29,0.88) 56%, #16161d 100%);
}

.cv-content{position:relative;z-index:2;padding:20px 20px 22px;display:flex;flex-direction:column;min-height:288px;}
.cv-top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:auto;}
.cv-index{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.cv-icon-badge{
  width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.10);
  transition:transform .3s cubic-bezier(.22,.9,.3,1),background .3s ease;
}
.cv-icon-badge svg{width:14px;height:14px;}

.cv-text{margin-top:16px;}
.cv-title{font-size:16px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:3px;}
.cv-subtitle{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;}

.cv-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.cv-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 0;border-radius:8px;font-size:11px;font-weight:600;
  background:rgba(124,108,240,0.14);border:1px solid rgba(124,108,240,0.25);
  color:#cfc9fb;cursor:pointer;
  transition:background .22s ease,border-color .22s ease,transform .22s cubic-bezier(.22,.9,.3,1),box-shadow .22s ease;
}
.cv-btn:hover{
  background:var(--hover-accent,rgba(124,108,240,0.24));
  border-color:var(--hover-accent2,#cfc9fb);
  color:#fff;
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,0.30), 0 0 0 1px var(--hover-accent2,#cfc9fb) inset;
}
.cv-btn:active{transform:translateY(0) scale(0.96);}
.cv-btn svg{width:11px;height:11px;transition:transform .22s cubic-bezier(.22,.9,.3,1);}
.cv-btn:hover svg{transform:translateY(-1px) scale(1.08);}

.cv-view{
  position:relative;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:10.5px;font-weight:600;letter-spacing:.02em;
  color:rgba(255,255,255,0.40);
  padding:7px 0;border-radius:7px;
  cursor:pointer;
  isolation:isolate;
  overflow:hidden;
  transition:color .25s ease;
}
/* expanding accent-colored fill that grows from center on hover */
.cv-view::before{
  content:'';
  position:absolute;inset:0;z-index:-1;
  border-radius:7px;
  background:var(--hover-accent,rgba(124,108,240,0.40));
  opacity:0;
  transform:scaleX(0);
  transform-origin:center;
  transition:transform .35s cubic-bezier(.22,.9,.3,1),opacity .35s ease;
}
/* thin animated underline that sweeps in from both edges */
.cv-view::after{
  content:'';
  position:absolute;left:50%;bottom:2px;
  width:0;height:1.5px;
  background:var(--hover-accent2,#cfc9fb);
  border-radius:2px;
  transform:translateX(-50%);
  transition:width .3s cubic-bezier(.22,.9,.3,1);
}
.cv-view:hover{color:#fff;}
.cv-view:hover::before{opacity:1;transform:scaleX(1);}
.cv-view:hover::after{width:60%;}
.cv-view:hover .cv-view-icon{
  transform:translateX(3px) scale(1.12);
  filter:drop-shadow(0 0 4px var(--hover-accent2,#cfc9fb));
}
.cv-view:active{transform:scale(0.97);}
.cv-view-icon{
  display:flex;align-items:center;
  transition:transform .3s cubic-bezier(.22,.9,.3,1),filter .3s ease;
}
.cv-view-icon svg{width:10px;height:10px;}

.cv-card{--fade:1;}
.cv-card-face{opacity:var(--fade);}

.carousel-controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:26px;position:relative;z-index:1;}
.car-arrow{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border-soft);background:transparent;
  color:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.car-arrow:hover{border-color:var(--violet-line);background:var(--violet-soft);color:#fff;}
.car-arrow svg{width:16px;height:16px;}
.car-dots{display:flex;align-items:center;gap:7px;}
.car-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.16);border:none;cursor:pointer;transition:all .25s;padding:0;}
.car-dot.active{background:var(--violet);width:18px;border-radius:4px;}
</style>
</head>
<body>

<section class="resume-section">
  <div class="container">
    <div class="section-title">
      <h2>Resume</h2>
      <div class="rule"></div>
      <p>Professional background, education, and work experience in software development and web technologies</p>
    </div>

    <div class="carousel-wrap">
      <div class="ambient-glow"></div>
      <div class="carousel-viewport">
        <div class="carousel-track" id="track"></div>
      </div>
      <div class="carousel-controls">
        <button class="car-arrow" id="prevBtn" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="car-dots" id="dots"></div>
        <button class="car-arrow" id="nextBtn" aria-label="Next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
const data=[
  {idx:'01',type:'mobile',accent:'#10b981',accentRgb:'16,185,129',title:'Flutter Developer CV',sub:'Mobile Development'},
  {idx:'02',type:'backend',accent:'#3b82f6',accentRgb:'59,130,246',title:'Laravel Developer CV',sub:'Backend Development'},
  {idx:'03',type:'fullstack',accent:'#7c6cf0',accentRgb:'124,108,240',title:'Full-Stack Developer CV',sub:'Full-Stack Development'},
  {idx:'04',type:'backend',accent:'#3b82f6',accentRgb:'59,130,246',title:'NestJS Developer CV',sub:'API Development'},
];

const ICONS={
  mobile:'<svg viewBox="0 0 16 16" fill="none" stroke="#10b981" stroke-width="1.4"><rect x="4" y="1.5" width="8" height="13" rx="1.5"/><path d="M7 12.5h2"/></svg>',
  backend:'<svg viewBox="0 0 16 16" fill="none" stroke="#3b82f6" stroke-width="1.4"><ellipse cx="8" cy="4" rx="6" ry="2"/><path d="M2 4v8c0 1.1 2.7 2 6 2s6-.9 6-2V4"/><path d="M2 8c0 1.1 2.7 2 6 2s6-.9 6-2"/></svg>',
  fullstack:'<svg viewBox="0 0 16 16" fill="none" stroke="#7c6cf0" stroke-width="1.4"><rect x="2" y="2" width="12" height="9" rx="1.5"/><path d="M2 6h12"/><path d="M6 11v2.5M10 11v2.5"/></svg>'
};

/* ════ CANVAS-DRAWN "PHOTOGRAPH-LIKE" BACKGROUNDS ════
   Each specialty gets a richer, more photographic-feeling scene than flat CSS patterns:
   - fullstack: a glowing code editor scene (lines of "code" with syntax-color variation + glow)
   - mobile: a phone silhouette displaying a glowing app UI mockup
   - backend: a server rack scene with glowing status LEDs and connection traces */
function drawBackground(canvas,type,accentRgb){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // base dark gradient (depth)
  const base=ctx.createLinearGradient(0,0,0,H);
  base.addColorStop(0,'#1c1c26');
  base.addColorStop(1,'#0e0e14');
  ctx.fillStyle=base;
  ctx.fillRect(0,0,W,H);

  if(type==='fullstack'){
    // simulated code editor: rows of "code" lines with varied syntax-like colors
    const rowH=14, startY=40, leftX=24;
    const palette=['rgba(124,108,240,0.55)','rgba(13,202,240,0.45)','rgba(245,158,11,0.40)','rgba(255,255,255,0.18)'];
    for(let i=0;i<14;i++){
      const y=startY+i*rowH;
      if(y>H-30)break;
      const segs=2+Math.floor(Math.random()*3);
      let x=leftX+ (i%4)*8;
      for(let s=0;s<segs;s++){
        const w=14+Math.random()*46;
        ctx.fillStyle=palette[Math.floor(Math.random()*palette.length)];
        ctx.fillRect(x,y,w,4);
        x+=w+8;
        if(x>W-24)break;
      }
    }
    // glow blob bottom
    const g=ctx.createRadialGradient(W/2,H*0.92,10,W/2,H*0.92,W*0.55);
    g.addColorStop(0,`rgba(${accentRgb},0.30)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // top scanline grid
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    for(let y=0;y<H;y+=18){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  } else if(type==='mobile'){
    // phone silhouette
    const pw=86, ph=160, px=W/2-pw/2, py=20;
    ctx.fillStyle='rgba(255,255,255,0.04)';
    roundRect(ctx,px,py,pw,ph,18);ctx.fill();
    ctx.strokeStyle=`rgba(${accentRgb},0.45)`;
    ctx.lineWidth=1.5;
    roundRect(ctx,px,py,pw,ph,18);ctx.stroke();
    // notch
    ctx.fillStyle='rgba(0,0,0,0.4)';
    roundRect(ctx,px+pw/2-14,py+6,28,5,3);ctx.fill();
    // app UI mockup inside: header bar + cards
    ctx.fillStyle=`rgba(${accentRgb},0.30)`;
    roundRect(ctx,px+10,py+24,pw-20,10,4);ctx.fill();
    for(let i=0;i<3;i++){
      ctx.fillStyle=`rgba(${accentRgb},${0.18-i*0.04})`;
      roundRect(ctx,px+10,py+44+i*32,pw-20,24,6);ctx.fill();
    }
    const g=ctx.createRadialGradient(W/2,py+ph*0.5,10,W/2,py+ph*0.5,W*0.6);
    g.addColorStop(0,`rgba(${accentRgb},0.22)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  } else if(type==='backend'){
    // server rack: stacked units with status LEDs and connecting traces
    const rackX=W/2-70, rackW=140, unitH=20, gap=8, startY=30;
    for(let i=0;i<5;i++){
      const y=startY+i*(unitH+gap);
      if(y>H-40)break;
      ctx.fillStyle='rgba(255,255,255,0.04)';
      roundRect(ctx,rackX,y,rackW,unitH,4);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.07)';
      ctx.lineWidth=1;
      roundRect(ctx,rackX,y,rackW,unitH,4);ctx.stroke();
      // status LED
      ctx.beginPath();
      ctx.arc(rackX+12,y+unitH/2,2.6,0,Math.PI*2);
      ctx.fillStyle = Math.random()>0.3 ? `rgba(${accentRgb},0.9)` : 'rgba(255,255,255,0.15)';
      ctx.fill();
      // tiny vent lines
      ctx.strokeStyle='rgba(255,255,255,0.10)';
      for(let v=0;v<5;v++){
        ctx.beginPath();
        ctx.moveTo(rackX+30+v*16,y+5);
        ctx.lineTo(rackX+30+v*16,y+unitH-5);
        ctx.stroke();
      }
    }
    const g=ctx.createRadialGradient(W/2,H*0.85,10,W/2,H*0.85,W*0.6);
    g.addColorStop(0,`rgba(${accentRgb},0.25)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  // universal subtle vignette for photographic depth
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.85);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function cardHTML(d){
  return `<div class="cv-card-face" style="--hover-accent:rgba(${d.accentRgb},0.40);--hover-glow:rgba(${d.accentRgb},0.28);--hover-accent2:${d.accent};">
    <canvas class="cv-bg-canvas" width="288" height="288"></canvas>
    <div class="scan-line"></div>
    <div class="spec-overlay"></div>
    <div class="cv-content">
      <div class="cv-top-row">
        <span class="cv-index">${d.idx}</span>
        <div class="cv-icon-badge">${ICONS[d.type]}</div>
      </div>
      <div class="cv-text">
        <div class="cv-title">${d.title}</div>
        <div class="cv-subtitle" style="color:${d.accent}">${d.sub}</div>
      </div>
      <div class="cv-actions">
        <div class="cv-btn">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 2h7l3 3v7H2V2z"/><path d="M9 2v3h3"/></svg>
          PDF
        </div>
        <div class="cv-btn">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 2h10v10H2V2z"/><path d="M5 7h4M5 5h4M5 9h2"/></svg>
          Word
        </div>
      </div>
      <div class="cv-view">
        <span class="cv-view-icon">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 8s2-4 6-4 6 4 6 4-2 4-6 4-6-4-6-4z"/><circle cx="8" cy="8" r="1.5"/></svg>
        </span>
        View Details
      </div>
    </div>
  </div>`;
}

const track=document.getElementById('track');
const dotsWrap=document.getElementById('dots');
const viewport=document.querySelector('.carousel-viewport');
let cards=[],current=0;
const N=data.length;

data.forEach((d,i)=>{
  const el=document.createElement('div');
  el.className='cv-card';
  el.innerHTML=cardHTML(d);
  el.addEventListener('click',()=>goTo(i));
  track.appendChild(el);
  cards.push(el);

  const canvas=el.querySelector('.cv-bg-canvas');
  drawBackground(canvas,d.type,d.accentRgb);

  const dot=document.createElement('button');
  dot.className='car-dot';
  dot.addEventListener('click',()=>goTo(i));
  dotsWrap.appendChild(dot);
});
const dots=document.querySelectorAll('.car-dot');

function layout(){
  cards.forEach((c,i)=>{
    let offset=i-current;
    if(offset>N/2)offset-=N;
    if(offset<-N/2)offset+=N;

    let tx=0,scale=1,z=10,ry=0,fade=1;

    if(offset===0){tx=0;scale=1;z=30;ry=0;fade=1;c.classList.add('is-center');}
    else{c.classList.remove('is-center');}

    /* Size hierarchy, symmetric on both sides — center now more dominant:
       center  = 1.00  (largest, clearly the focal point)
       ±1      = 0.72  (equal on left/right, noticeably smaller than center)
       ±2      = 0.54  (equal on left/right, smaller than ±1)
       beyond  = 0.42  (hidden anyway) */
    if(offset===1){tx=235;scale=0.72;z=20;ry=-9;fade=0.55;}
    else if(offset===-1){tx=-235;scale=0.72;z=20;ry=9;fade=0.55;}
    else if(offset===2){tx=400;scale=0.54;z=5;ry=-15;fade=0.20;}
    else if(offset===-2){tx=-400;scale=0.54;z=5;ry=15;fade=0.20;}
    else if(offset!==0){tx=offset>0?560:-560;scale=0.42;z=1;fade=0;}

    c.style.zIndex=z;
    c.style.transform=`translateX(${tx}px) scale(${scale}) rotateY(${ry}deg)`;
    c.style.opacity = Math.abs(offset)<=2 ? 1 : 0;
    c.style.setProperty('--fade',fade);
    c.style.pointerEvents=Math.abs(offset)<=1?'auto':'none';
  });
  dots.forEach((d,i)=>d.classList.toggle('active',i===current));
}

function goTo(i){current=((i%N)+N)%N;layout();}

document.getElementById('prevBtn').addEventListener('click',()=>goTo(current-1));
document.getElementById('nextBtn').addEventListener('click',()=>goTo(current+1));

let startX=0,dragging=false;
viewport.addEventListener('pointerdown',e=>{dragging=true;startX=e.clientX;});
viewport.addEventListener('pointerup',e=>{if(!dragging)return;dragging=false;const dx=e.clientX-startX;if(dx>40)goTo(current-1);else if(dx<-40)goTo(current+1);});
viewport.addEventListener('pointerleave',()=>{dragging=false;});

layout();
})();
</script>
</body>
</html>

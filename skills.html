<body class="bg-surface text-on-surface min-h-screen flex flex-col">
  <!-- Main Content -->
  <main class="flex-1">
    <!-- Skills Section -->
    <section class="px-margin py-xl">
      <div class="text-center mb-xl">
        <h1 class="font-headline-lg text-headline-lg text-primary mb-md">Skills</h1>
        <p class="font-body-md text-body-md text-on-surface-variant">
          <span class="lang-en">All my technical skills and proficiency levels</span>
          <span class="lang-ar" style="display: none">كل مهاراتي التقنية ومستويات الكفاءة</span>
        </p>
      </div>
      
      <!-- Skills Grid (Bento Style) -->
      <div id="skills-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md">
        <!-- سيتم تحميل المهارات ديناميكيًا من data/skills.json -->
      </div>
    </section>
  </main>

  <!-- Footer (Glass Style - مطابق للقالب) -->
  <footer class="bg-surface/60 backdrop-blur-xl w-full mt-auto py-xl px-margin text-center flex flex-col items-center justify-center gap-md">
    <div class="font-headline-sm text-headline-sm font-black text-primary">AH</div>
    <p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 Assem Adel Habib</p>
    <div class="flex gap-lg">
      <a class="text-primary underline font-body-sm text-body-sm hover:opacity-80 transition-opacity" href="https://linkedin.com/in/assem-habib-5236a423b" target="_blank">LinkedIn</a>
      <a class="text-on-surface-variant font-body-sm text-body-sm hover:text-primary transition-colors" href="https://github.com/assem2023-habib" target="_blank">GitHub</a>
      <a class="text-on-surface-variant font-body-sm text-body-sm hover:text-primary transition-colors" href="index.html">Portfolio</a>
    </div>
  </footer>

  <!-- Bottom Navigation (Mobile Only - مطابق للقالب) -->
  <nav class="bg-surface/60 backdrop-blur-xl fixed bottom-0 w-full z-50 rounded-t-xl shadow-[0_-4px_12px_rgba(0,88,188,0.08)] flex justify-around items-center w-full px-base py-sm pb-safe">
    <a href="index.html" class="flex flex-col items-center justify-center text-on-surface-variant font-label-md text-label-md hover:bg-primary-container/20 p-2 rounded-lg transition-all active:scale-90">
      <span class="material-symbols-outlined" data-icon="home">home</span>
      <span>Home</span>
    </a>
    <a href="projects.html" class="flex flex-col items-center justify-center text-on-surface-variant font-label-md text-label-md hover:bg-primary-container/20 p-2 rounded-lg transition-all active:scale-90">
      <span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
      <span>Projects</span>
    </a>
    <a href="skills.html" class="flex flex-col items-center justify-center text-primary font-bold font-label-md text-label-md p-2 rounded-lg transition-all active:scale-90">
      <span class="material-symbols-outlined" data-icon="code">code</span>
      <span>Skills</span>
    </a>
    <a href="index.html#testimonials" class="flex flex-col items-center justify-center text-on-surface-variant font-label-md text-label-md hover:bg-primary-container/20 p-2 rounded-lg transition-all active:scale-90">
      <span class="material-symbols-outlined" data-icon="person">person</span>
      <span>Profile</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script>
    // تحميل جميع المهارات من data/skills.json
    document.addEventListener('DOMContentLoaded', function() {
      fetch('data/skills.json')
        .then(response => response.json())
        .then(skills => {
          const container = document.getElementById('skills-container');
          container.innerHTML = '';
          
          // ألوان مستويات المهارات (مطابق للقالب)
          const levelColors = {
            'excellent': '#28a745',
            'very-good': '#007bff',
            'good': '#fd7e14',
            'average': '#6c757d'
          };
          
          // تسميات المستويات (باللغتين)
          const levelLabels = {
            'excellent': { en: 'Excellent', ar: 'ممتاز' },
            'very-good': { en: 'Very Good', ar: 'جيد جداً' },
            'good': { en: 'Good', ar: 'جيد' },
            'average': { en: 'Average', ar: 'متوسط' }
          };
          
          // إنشاء بطاقات المهارات (Bento Style)
          skills.forEach(skill => {
            const skillCard = document.createElement('div');
            skillCard.className = 'bg-white/80 backdrop-blur-xl rounded-xl shadow-[0_4px_12px_rgba(0,88,188,0.08)] p-md flex items-center justify-between border border-outline-variant/20 hover:border-primary/30 transition-all';
            
            skillCard.innerHTML = `
              <div class="flex items-center gap-md">
                <div class="w-10 h-10 rounded-lg bg-primary-container/20 flex items-center justify-center">
                  <span class="material-symbols-outlined text-primary">${skill.icon || 'code'}</span>
                </div>
                <div>
                  <h3 class="font-label-md text-label-md text-on-surface font-bold">${skill.name}</h3>
                  <p class="font-body-sm text-body-sm text-on-surface-variant">${skill.description || ''}</p>
                </div>
              </div>
              <div class="flex items-center gap-sm">
                <div class="w-3 h-3 rounded-full" style="background-color: ${levelColors[skill.level]}"></div>
                <span class="font-label-md text-label-md text-on-surface-variant">
                  <span class="lang-en">${levelLabels[skill.level].en}</span>
                  <span class="lang-ar" style="display: none">${levelLabels[skill.level].ar}</span>
                </span>
              </div>
            `;
            
            container.appendChild(skillCard);
          });
        })
        .catch(error => console.error('Error loading skills:', error));
    });
  </script>
</body>
</html>
